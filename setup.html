<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shop Setup | DSIMS</title>
  <link rel="stylesheet" href="css/app-shell.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  <style>
    :root {
      --hero-gradient: linear-gradient(135deg, #38bdf8 0%, #8b5cf6 50%, #fff 100%);
      --glass-bg: rgba(30, 41, 59, 0.5);
      --glass-border: rgba(148, 163, 184, 0.15);
      --neon-blue: #38bdf8;
      --neon-purple: #8b5cf6;
    }

    body { 
      background: radial-gradient(circle at 20% 20%, rgba(56, 189, 248, 0.08), transparent 40%),
                  radial-gradient(circle at 80% 80%, rgba(139, 92, 246, 0.08), transparent 40%),
                  radial-gradient(circle at 50% 50%, rgba(30, 41, 59, 1), transparent 70%),
                  var(--bg-main);
      position: relative;
      overflow-x: hidden;
    }

    .card {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3), 0 0 40px rgba(56, 189, 248, 0.08);
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--neon-blue), var(--neon-purple), transparent);
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--neon-blue) 0%, var(--neon-purple) 100%);
      color: var(--text-inverse);
      border: none;
      box-shadow: 0 8px 30px rgba(56, 189, 248, 0.3), 0 4px 15px rgba(139, 92, 246, 0.2);
      transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
    }

    .btn-primary::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.15), transparent);
      transition: left 0.6s ease;
    }

    .btn-primary:hover::before {
      left: 100%;
    }

    .btn-primary:hover {
      transform: translateY(-3px) scale(1.02);
      box-shadow: 0 15px 50px rgba(56, 189, 248, 0.4), 0 8px 30px rgba(139, 92, 246, 0.3);
    }

    .setup-logo {
      width: 72px;
      height: 72px;
      filter: drop-shadow(0 0 25px rgba(56, 189, 248, 0.4));
      animation: logoPulse 4s infinite ease-in-out;
    }

    @keyframes logoPulse {
      0%, 100% { transform: scale(1); filter: drop-shadow(0 0 25px rgba(56, 189, 248, 0.4)); }
      50% { transform: scale(1.08); filter: drop-shadow(0 0 40px rgba(56, 189, 248, 0.6)); }
    }

    h1 {
      background: var(--hero-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* Background Blobs */
    .bg-blobs {
      position: fixed;
      inset: 0;
      z-index: -1;
      overflow: hidden;
      pointer-events: none;
    }

    .blob {
      position: absolute;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      filter: blur(140px);
      opacity: 0.08;
      animation: blobFloat 25s infinite alternate ease-in-out;
    }

    .blob-1 {
      background: linear-gradient(135deg, var(--neon-blue) 0%, var(--neon-purple) 100%);
      top: -200px;
      right: -150px;
      animation-delay: 0s;
    }

    .blob-2 {
      background: linear-gradient(135deg, var(--neon-purple) 0%, var(--neon-blue) 100%);
      bottom: -200px;
      left: -150px;
      animation-delay: -8s;
    }

    @keyframes blobFloat {
      0% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(70px, -50px) scale(1.08); }
      100% { transform: translate(100px, 30px) scale(1.12); }
    }

    /* Particles */
    .particles {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .particle {
      position: absolute;
      width: 4px;
      height: 4px;
      background: var(--neon-blue);
      border-radius: 50%;
      opacity: 0.3;
      animation: particleFloat 12s infinite linear;
    }

    @keyframes particleFloat {
      0% { transform: translateY(100vh) scale(0); opacity: 0; }
      10% { opacity: 0.3; }
      90% { opacity: 0.3; }
      100% { transform: translateY(-100vh) scale(1); opacity: 0; }
    }
  </style>
  <script src="js/theme.js"></script>
</head>
<body class="animate-fade">
  <div class="bg-blobs">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
  </div>

  <div class="particles" id="particles"></div>

  <div class="app-container" style="justify-content: center; align-items: center; padding: 2rem; position: relative; z-index: 10;">
    <main class="card animate-slide-up" style="width: 100%; max-width: 900px;">
      <div style="text-align: center; margin-bottom: 2rem;">
        <img src="assets/icons/custom-logo.png" alt="DSIMS" class="setup-logo">
        <h1 style="margin: 0; font-size: 2rem; font-weight: 800;">Shop Setup</h1>
        <p style="margin: 0; color: var(--text-muted);">Configure your business profile to get started.</p>
      </div>

      <section style="margin-bottom: 2.5rem;">
        <h3 style="margin-bottom: 1.5rem; display: flex; align-items: center; gap: 0.5rem;">
          <i class="fas fa-store" style="color: var(--neon-blue);"></i> Business Information
        </h3>
        <form id="shopForm" class="grid grid-2">
          <div class="form-group">
            <label class="form-label">Shop Name</label>
            <input type="text" id="shopName" class="form-control" placeholder="Bright Mart" required>
          </div>
          <div class="form-group">
            <label class="form-label">Owner Name</label>
            <input type="text" id="ownerName" class="form-control" placeholder="Ravi Kumar" required>
          </div>
          <div class="form-group">
            <label class="form-label">Shop Category</label>
            <input type="text" id="category" class="form-control" placeholder="Groceries / Fashion" required>
          </div>
          <div class="form-group">
            <label class="form-label">Currency Symbol</label>
            <input type="text" id="currency" class="form-control" placeholder="USD / INR / EUR" required>
          </div>
        </form>
      </section>

      <section>
        <div class="flex justify-between items-center" style="margin-bottom: 1.5rem;">
          <h3 style="margin: 0; display: flex; align-items: center; gap: 0.5rem;">
            <i class="fas fa-boxes" style="color: var(--neon-blue);"></i> Initial Inventory
          </h3>
          <button class="btn btn-secondary" id="addProductBtn">
            <i class="fas fa-plus"></i> Add Product
          </button>
        </div>

        <form id="productForm" class="grid setup-product-grid" style="margin-bottom: 1.5rem; background: rgba(30, 41, 59, 0.6); padding: 1.5rem; border-radius: var(--radius-md); border: 1px solid var(--glass-border);">
          <input type="text" id="productName" class="form-control" placeholder="Product Name">
          <input type="number" id="productPrice" class="form-control" placeholder="Price" min="0" step="0.01">
          <input type="number" id="productQty" class="form-control" placeholder="Qty" min="0">
          <input type="text" id="productCategory" class="form-control" placeholder="Category">
        </form>

        <div class="table-container" style="margin-bottom: 2rem; max-height: 300px; overflow-y: auto;">
          <table>
            <thead>
              <tr>
                <th>Name</th>
                <th>Category</th>
                <th>Price</th>
                <th>Qty</th>
              </tr>
            </thead>
            <tbody id="productTable"></tbody>
          </table>
        </div>

        <div class="flex justify-end gap-2" style="border-top: 1px solid var(--border); padding-top: 2rem;">
          <button class="btn btn-ghost" onclick="location.href='dashboard.html'">Skip Setup</button>
          <button class="btn btn-primary" id="finishSetup" style="padding-left: 2rem; padding-right: 2rem;">
            Complete Setup <i class="fas fa-check-circle"></i>
          </button>
        </div>
      </section>
    </main>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <!-- Firebase SDK (Compat) -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-analytics-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/firebase-storage.js"></script>
  <script>
    // Create floating particles
    (function createParticles() {
      const container = document.getElementById('particles');
      if (!container) return;
      
      const particleCount = 25;
      for (let i = 0; i < particleCount; i++) {
        const particle = document.createElement('div');
        particle.className = 'particle';
        particle.style.left = Math.random() * 100 + '%';
        particle.style.animationDelay = Math.random() * 12 + 's';
        particle.style.animationDuration = (Math.random() * 10 + 10) + 's';
        particle.style.width = (Math.random() * 4 + 2) + 'px';
        particle.style.height = particle.style.width;
        particle.style.opacity = Math.random() * 0.4 + 0.1;
        
        // Random color between blue and purple
        const colors = ['#38bdf8', '#8b5cf6', '#a78bfa'];
        particle.style.background = colors[Math.floor(Math.random() * colors.length)];
        
        container.appendChild(particle);
      }
    })();

    // Toast Logic
    function showToast(message, type = 'success') {
      const container = document.getElementById('toastContainer');
      const toast = document.createElement('div');
      toast.className = `toast toast-${type}`;
      const icon = type === 'success' ? 'check-circle' : (type === 'error' ? 'exclamation-circle' : 'info-circle');
      toast.innerHTML = `<i class="fas fa-${icon}"></i> <span>${message}</span>`;
      container.appendChild(toast);
      setTimeout(() => toast.classList.add('active'), 10);
      setTimeout(() => {
        toast.classList.remove('active');
        setTimeout(() => toast.remove(), 300);
      }, 3000);
    }
  </script>
  <script src="js/setup.js"></script>
</body>
</html>
