<svg width="160" height="50" viewBox="0 0 160 50" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6ce5e8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a46cf2;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Icon/Shape representing inventory/management -->
  <rect x="0" y="10" width="30" height="30" rx="5" fill="url(#logoGradient)" opacity="0.9"/>
  <rect x="7" y="18" width="16" height="2.5" rx="1" fill="#0b1324"/>
  <rect x="7" y="23" width="10" height="2.5" rx="1" fill="#0b1324"/>
  <rect x="7" y="28" width="13" height="2.5" rx="1" fill="#0b1324"/>
  
  <!-- DSIMS Text -->
  <text x="38" y="32" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="700" fill="url(#logoGradient)" letter-spacing="1.5px">DSIMS</text>
