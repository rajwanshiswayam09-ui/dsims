<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DSIMS</title>
  <link rel="stylesheet" href="css/app-shell.css">
  <style>
    .splash-screen {
      position: fixed;
      inset: 0;
      background: #0f172a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      color: white;
    }
    .splash-logo { 
      width: 150px; 
      height: 150px; 
      margin-bottom: 2.5rem; 
      filter: drop-shadow(0 0 20px var(--accent));
      animation: pulseAndGlow 2.5s infinite ease-in-out; 
    }
    .loader { width: 300px; height: 6px; background: rgba(255,255,255,0.05); border-radius: 10px; overflow: hidden; position: relative; }
    .loader-bar { 
      height: 100%; 
      background: linear-gradient(90deg, var(--accent), #818cf8); 
      width: 0; 
      animation: load 2.5s cubic-bezier(0.65, 0, 0.35, 1) forwards; 
      box-shadow: 0 0 15px var(--accent);
    }
    @keyframes pulseAndGlow { 
      0%, 100% { transform: scale(1); filter: drop-shadow(0 0 15px var(--accent)); opacity: 1; } 
      50% { transform: scale(1.1); filter: drop-shadow(0 0 30px var(--accent)); opacity: 0.9; } 
    }
    @keyframes load { 0% { width: 0; } 30% { width: 40%; } 70% { width: 85%; } 100% { width: 100%; } }
    .splash-text {
      margin-top: 1.5rem; 
      color: var(--text-muted); 
      font-size: 0.75rem; 
      font-weight: 600;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      animation: fadeInOut 2s infinite;
    }
    @keyframes fadeInOut { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }
  </style>
</head>
<body>
  <div class="splash-screen" id="splashScreen">
    <img src="assets/icons/custom-logo.png" alt="DSIMS Logo" class="splash-logo">
    <div class="loader">
      <div class="loader-bar"></div>
    </div>
    <p class="splash-text">System Initializing</p>
  </div>

  <!-- Firebase SDK (Compat) -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-analytics-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/firebase-storage.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      setTimeout(async () => {
        try {
          const current = await StorageAPI.getCurrentUser();
          if (current) {
            const hasShop = await StorageAPI.getShopDetails();
            window.location.href = hasShop ? 'dashboard.html' : 'setup.html';
          } else {
            window.location.href = 'welcome.html';
          }
        } catch (_) {
          window.location.href = 'welcome.html';
        }
      }, 2500);
    });
  </script>
</body>
</html>
