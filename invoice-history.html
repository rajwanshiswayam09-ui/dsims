<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Invoice History | DSIMS</title>
  <link rel="stylesheet" href="css/app-shell.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  <script src="js/theme.js"></script>
</head>
<body class="animate-fade">
  <div class="app-container">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <img src="assets/icons/custom-logo.png" alt="DSIMS" class="sidebar-logo">
        <span class="sidebar-title">DSIMS</span>
      </div>
      <nav class="sidebar-nav">
        <a href="dashboard.html" class="nav-item"><i class="fas fa-boxes"></i> <span>Dashboard</span></a>
        <a href="shop-details.html" class="nav-item"><i class="fas fa-store"></i> <span>Shop Details</span></a>
        <a href="analytics.html" class="nav-item"><i class="fas fa-chart-line"></i> <span>Analytics</span></a>
        <a href="invoice.html" class="nav-item"><i class="fas fa-file-invoice"></i> <span>Invoices</span></a>
        <a href="invoice-history.html" class="nav-item active"><i class="fas fa-history"></i> <span>Invoice History</span></a>
      </nav>
      <div class="sidebar-footer" style="padding: 1rem; border-top: 1px solid var(--border);">
        <button class="nav-item btn-ghost w-full" style="width: 100%; justify-content: flex-start;" onclick="StorageAPI.clearCurrentUser(); location.href='auth.html';">
          <i class="fas fa-sign-out-alt"></i> <span>Logout</span>
        </button>
      </div>
    </aside>

    <div class="main-wrapper">
      <header class="topbar">
        <div class="topbar-content">
          <button class="menu-toggle"><i class="fas fa-bars"></i></button>
          <h2 style="margin: 0; font-size: 1.25rem;">Invoice History</h2>
        </div>
        <div class="topbar-content">
          <div class="flex items-center gap-4">
            <button id="themeToggle" class="btn-ghost" style="width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer;">
              <i class="fas fa-moon"></i>
            </button>
            <div class="flex items-center gap-2">
              <div id="topbarAvatar" style="width: 32px; height: 32px; border-radius: 50%; overflow: hidden; background: var(--bg-input); display: flex; align-items: center; justify-content: center; border: 1px solid var(--border);">
                <i class="fas fa-user-circle" id="topbarIcon" style="font-size: 1.25rem; color: var(--text-muted);"></i>
                <img id="topbarImg" src="" alt="P" style="width: 100%; height: 100%; object-fit: cover; display: none;">
              </div>
              <span id="userNameDisplay">Admin</span>
            </div>
          </div>
        </div>
      </header>

      <main class="main-content">
        <div class="card animate-slide-up">
          <div class="flex items-center justify-between mobile-flex-col gap-4" style="margin-bottom: 2rem;">
            <div>
              <h2 style="margin: 0;">Invoices</h2>
              <p style="margin: 0;">View and manage your generated invoices.</p>
            </div>
            <div class="flex gap-2 mobile-flex-col mobile-w-full">
              <div style="position: relative;" class="mobile-w-full">
                <i class="fas fa-search" style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--text-muted);"></i>
                <input type="text" id="invoiceSearch" class="form-control mobile-w-full" style="padding-left: 2.75rem; width: 300px;" placeholder="Search customer or #INV...">
              </div>
              <button class="btn btn-primary mobile-w-full" onclick="location.href='invoice.html'">
                <i class="fas fa-plus"></i> New Invoice
              </button>
            </div>
          </div>

          <div class="table-container">
            <table>
              <thead>
                <tr>
                  <th>Invoice #</th>
                  <th>Customer Name</th>
                  <th>Date</th>
                  <th>Total Amount</th>
                  <th>Status</th>
                  <th style="text-align: right;">Actions</th>
                </tr>
              </thead>
              <tbody id="invoiceHistoryTable">
                <!-- Data injected here -->
              </tbody>
            </table>
          </div>
        </div>
      </main>
    </div>
  </div>

  <!-- Modal for Viewing Invoice -->
  <div class="modal-overlay" id="viewInvoiceModal">
    <div class="modal-content" style="max-width: 800px; max-height: 90vh; overflow-y: auto;">
      <div class="modal-header">
        <h3 style="margin: 0;">Invoice Details</h3>
        <button class="btn-ghost" onclick="document.getElementById('viewInvoiceModal').classList.remove('active')"><i class="fas fa-times"></i></button>
      </div>
      <div class="modal-body" id="invoiceViewContent">
        <!-- Content injected here -->
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="document.getElementById('viewInvoiceModal').classList.remove('active')">Close</button>
        <button class="btn btn-primary" id="printModalBtn"><i class="fas fa-print"></i> Print</button>
      </div>
    </div>
  </div>

  <!-- Firebase SDK (Compat) -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-analytics-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/firebase-storage.js"></script>
  <script src="js/invoice-history.js"></script>
</body>
</html>
