<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard | DSIMS</title>
  <link rel="stylesheet" href="css/app-shell.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  <script src="js/theme.js"></script>
</head>
<body class="animate-fade">
  <div class="app-container">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <img src="assets/icons/custom-logo.png" alt="DSIMS" class="sidebar-logo">
        <span class="sidebar-title">DSIMS</span>
      </div>
      <nav class="sidebar-nav">
        <a href="dashboard.html" class="nav-item active"><i class="fas fa-boxes"></i> <span>Dashboard</span></a>
        <a href="shop-details.html" class="nav-item"><i class="fas fa-store"></i> <span>Shop Details</span></a>
        <a href="analytics.html" class="nav-item"><i class="fas fa-chart-line"></i> <span>Analytics</span></a>
        <a href="invoice.html" class="nav-item"><i class="fas fa-file-invoice"></i> <span>Invoices</span></a>
        <a href="invoice-history.html" class="nav-item"><i class="fas fa-history"></i> <span>Invoice History</span></a>
      </nav>
      <div class="sidebar-footer" style="padding: 1rem; border-top: 1px solid var(--border);">
        <button class="nav-item btn-ghost w-full" style="width: 100%; justify-content: flex-start;" onclick="StorageAPI.clearCurrentUser(); location.href='auth.html';">
          <i class="fas fa-sign-out-alt"></i> <span>Logout</span>
        </button>
      </div>
    </aside>

    <div class="main-wrapper">
      <header class="topbar">
        <div class="topbar-content">
          <h2 style="margin: 0; font-size: 1.25rem;">Overview</h2>
        </div>
        <div class="topbar-content">
          <div class="flex items-center gap-2">
            <div id="topbarAvatar" style="width: 32px; height: 32px; border-radius: 50%; overflow: hidden; background: var(--bg-input); display: flex; align-items: center; justify-content: center; border: 1px solid var(--border);">
              <i class="fas fa-user-circle" id="topbarIcon" style="font-size: 1.25rem; color: var(--text-muted);"></i>
              <img id="topbarImg" src="" alt="P" style="width: 100%; height: 100%; object-fit: cover; display: none;">
            </div>
            <span id="userNameDisplay">Admin</span>
          </div>
        </div>
      </header>

      <main class="main-content">
        <div class="animate-slide-up">
          <div class="stats-grid">
            <div class="card stat-card">
              <div class="stat-icon"><i class="fas fa-box"></i></div>
              <div class="stat-info">
                <p>Total Products</p>
                <h3 id="totalProducts">0</h3>
              </div>
            </div>
            <div class="card stat-card">
              <div class="stat-icon" style="background-color: rgba(239, 68, 68, 0.1); color: var(--danger);"><i class="fas fa-exclamation-triangle"></i></div>
              <div class="stat-info">
                <p>Low Stock</p>
                <h3 id="lowStock">0</h3>
              </div>
            </div>
            <div class="card stat-card">
              <div class="stat-icon" style="background-color: rgba(34, 197, 94, 0.1); color: var(--success);"><i class="fas fa-wallet"></i></div>
              <div class="stat-info">
                <p>Inventory Value</p>
                <h3 id="inventoryValue">0</h3>
              </div>
            </div>
          </div>

          <div class="grid two" style="display: grid; grid-template-columns: 2fr 1fr; gap: 1.5rem; align-items: start;">
            <div class="card">
              <div class="flex items-center justify-between" style="margin-bottom: 1.5rem;">
                <div>
                  <h2 style="margin: 0;">Inventory Management</h2>
                  <p style="margin: 0;">Manage your stock and product details.</p>
                </div>
                <button class="btn btn-primary" id="openAdd">
                  <i class="fas fa-plus"></i> Add Product
                </button>
              </div>
              
              <div class="table-container">
                <table>
                  <thead>
                    <tr>
                      <th>Product Name</th>
                      <th>Category</th>
                      <th>Price</th>
                      <th>Quantity</th>
                      <th>Status</th>
                      <th style="text-align: right;">Actions</th>
                    </tr>
                  </thead>
                  <tbody id="inventoryTable"></tbody>
                </table>
              </div>
            </div>

            <div class="card">
              <h2 style="margin-bottom: 1.5rem;">Recent Activity</h2>
              <div id="recentActivity">
                <p style="color: var(--text-muted); text-align: center; padding: 2rem;">Loading activity...</p>
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <!-- Modal -->
  <div class="modal-overlay" id="productModal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="modalTitle" style="margin: 0;">Add Product</h3>
        <button class="btn-ghost" id="closeModal"><i class="fas fa-times"></i></button>
      </div>
      <form id="productModalForm">
        <div class="modal-body">
          <input type="hidden" id="modalProductId">
          <div class="form-group">
            <label class="form-label" for="modalName">Product Name</label>
            <input type="text" id="modalName" class="form-control" placeholder="Enter product name" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="modalCategory">Category</label>
            <input type="text" id="modalCategory" class="form-control" placeholder="Electronics, Groceries, etc." required>
          </div>
          <div class="grid two" style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
            <div class="form-group">
              <label class="form-label" for="modalPrice">Price</label>
              <input type="number" id="modalPrice" class="form-control" min="0" step="0.01" required>
            </div>
            <div class="form-group">
              <label class="form-label" for="modalQty">Quantity</label>
              <input type="number" id="modalQty" class="form-control" min="0" required>
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" id="cancelModal">Cancel</button>
          <button type="submit" class="btn btn-primary">Save Product</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Firebase SDK (Compat) -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-analytics-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/firebase-storage.js"></script>
  <script src="js/inventory.js"></script>
  <script src="js/dashboard.js"></script>
</body>
</html>
