<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Auth | DSIMS</title>
  <link rel="stylesheet" href="css/app-shell.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  <style>
    body { display: flex; align-items: center; justify-content: center; background: radial-gradient(circle at top right, rgba(56, 189, 248, 0.1), transparent), radial-gradient(circle at bottom left, rgba(56, 189, 248, 0.05), transparent), var(--bg-main); }
    .auth-card { width: 100%; max-width: 420px; padding: 2.5rem; background: var(--bg-card); border-radius: var(--radius-xl); border: 1px solid var(--border); box-shadow: var(--shadow-lg); }
    .auth-header { text-align: center; margin-bottom: 2rem; }
    .auth-logo { width: 64px; height: 64px; margin-bottom: 1rem; }
    .auth-tabs { display: flex; background: var(--bg-input); padding: 0.25rem; border-radius: var(--radius-md); margin-bottom: 2rem; }
    .auth-tab { flex: 1; padding: 0.5rem; border: none; background: transparent; color: var(--text-muted); font-weight: 600; cursor: pointer; border-radius: var(--radius-sm); transition: var(--transition); }
    .auth-tab.active { background: var(--bg-card); color: var(--accent); box-shadow: var(--shadow-sm); }
    .auth-message { margin-top: 1rem; text-align: center; font-size: 0.875rem; min-height: 1.25rem; }
    .auth-message.error { color: var(--danger); }
    .auth-message.success { color: var(--success); }
  </style>
  <script src="js/theme.js"></script>
</head>
<body class="animate-fade">
  <div class="auth-card animate-slide-up">
    <div class="auth-header">
      <img src="assets/icons/custom-logo.png" alt="DSIMS Logo" class="auth-logo">
      <h2 style="margin: 0;">Welcome to DSIMS</h2>
      <p style="margin: 0; font-size: 0.875rem;">Inventory Management Simplified</p>
    </div>

    <div class="auth-tabs">
      <button id="signupTab" class="auth-tab active">Create Account</button>
      <button id="loginTab" class="auth-tab">Login</button>
    </div>

    <form id="authForm">
      <div id="nameField" class="form-group">
        <label class="form-label" for="name">Full Name</label>
        <div style="position: relative;">
          <i class="fas fa-user" style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--text-muted);"></i>
          <input type="text" id="name" class="form-control" style="padding-left: 2.75rem;" placeholder="John Doe">
        </div>
      </div>
      
      <div class="form-group">
        <label class="form-label" for="email">Email Address</label>
        <div style="position: relative;">
          <i class="fas fa-envelope" style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--text-muted);"></i>
          <input type="email" id="email" class="form-control" style="padding-left: 2.75rem;" placeholder="name@company.com" required>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <div style="position: relative;">
          <i class="fas fa-lock" style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--text-muted);"></i>
          <input type="password" id="password" class="form-control" style="padding-left: 2.75rem;" placeholder="••••••••" required>
        </div>
      </div>

      <div class="form-group" id="confirmPasswordField">
        <label class="form-label" for="confirmPassword">Confirm Password</label>
        <div style="position: relative;">
          <i class="fas fa-shield-alt" style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--text-muted);"></i>
          <input type="password" id="confirmPassword" class="form-control" style="padding-left: 2.75rem;" placeholder="••••••••">
        </div>
      </div>

      <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">
        <span>Continue</span> <i class="fas fa-arrow-right"></i>
      </button>

      <p id="authMessage" class="auth-message"></p>
    </form>
  </div>

  <!-- Firebase SDK (Compat) -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-analytics-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/firebase-storage.js"></script>
  <script src="js/auth.js"></script>
  <script>
    // Theme initialization
    if (window.ThemeAPI) ThemeAPI.set('dark');
  </script>
</body>
</html>
